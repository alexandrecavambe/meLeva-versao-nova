<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Type account</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body{
            min-height: 100vh;
            background: #000 url('imagem/background-principal.png') no-repeat top center;
            background-size: cover;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container{
            display: flex;
            flex-direction: column;
            width: 90%;
            background-color: transparent;
            padding: 20px;
        }

        img{
            display: block;
            width: 45vw;
            max-width: 300px;
            padding: 20px;
            margin: auto;
        }

        h1{
            color: rgb(9, 194, 9);
            font-weight: 700;
            font-size: clamp(1.4rem, 8vw, 2.2rem);
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }

        h2{
            color: #119111;
            font-weight: 700;
            font-size: clamp(1.2rem, 5vw, 2rem);
            text-align: center;
            padding: 10px;
            margin-bottom: 30px;
        }

        button{
            font-size: clamp(1rem, 3vw, 2rem);
            font-weight: 600;
            color: #fff;
            padding: 15px;
            margin: 10px;
            border: none;
            border-radius: 45px;
            cursor: pointer;
            transition: all 0.5s;

            &:active{
                transform: scale(0.8);
            }

        }
        
        .btn-moto{
            background-color: #000000f6;
            margin-top: 70px;
            
            
            &:hover + .btn-pass{
                
                background-color: #000000f6;
            }

            &:hover{
                background-color: #119111;
            }
        }

        .btn-pass{
            background-color: rgb(6, 85, 6);

            &:active,{
                background-color: #119111;
            }

            &:hover{
                background-color: #119111;
            }
        }

        p{
            color: #000;
            text-align: center;
            font-size: clamp(13px, 2vw, 18px);
            font-weight: 600;
            margin-top: 30px;


            a{
                text-decoration: none;
                color: rgb(9, 9, 97);
                transition: 0.3s;

                &:active{
                    color: #119111;
                }

                &:hover{
                    text-decoration: underline;
                }
            }

        } 
    </style>
</head>
<body>
    <main class="container">

        <img src="imagem/meLeva-2.png" alt="Logo do meLeva">

        <h1>Bem-vindo ao meLeva</h1>

        <h2>O futuro da mobilidade começa aqui</h2>


        <button type="button" class="btn-moto">Motorista</button>
        <button type="button" class="btn-pass">Passageiro</button>

        
        <p>
            Utlizar o nosso aplicativo significa que você concorda con nossos 
            <a href="#">
                Termos de Uso e Política de Privacidade
            </a>
        </p> 
    </main>
</body>
</html>
