<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body{
            min-height: 100vh;
            background: #000 url('imagem/background.png') no-repeat top center;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container{
            width: 90vw;
            max-width: 800px;
            background-color: transparent;
            border: 1px solid #d3d2d2e1;
            border-radius: 10px;
            box-shadow: 4px 4px 4px rgba(0, 0, 0, 0.15);
            padding: 30px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        h3{
            font-size: 1.8em;
            color: rgba(0, 235, 0, 0.671);
            text-align: center;
            padding: 10px;
        }

        .inputs-box-label{
            position: relative;
            width: 100%;
            height: 40px;
            margin: 20px 0;
            

                label{
                    position: absolute;
                    left: 18px;
                    top: 12px;
                    color: #8d8b8b;
                    font-size: 14px;
                    pointer-events: none;
                    transition: 0.5s ease;
                }

                input{
                    width: 100%;
                    height: 45px;
                    background-color: transparent;
                    color: #ffffffcc;
                    font-size: 1em;
                    padding: 12px 10px;
                    border: none;
                    outline: none;
                    border-radius: 18px;
                    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);


                    &:focus{
                        outline: 1px solid green;
                    }
                }
            }

            .inputs-box-label input:focus + label{
                top: -12px;
                font-size: 12px;
                color: green;
                font-weight: 400;
                background: #ffffff;
                padding: 0 5px;
                border-radius: 5px;
            } 

            .inputs-box-label input:valid + label{
                top: -12px;
                font-size: 12px;
                color: green;
                font-weight: 400;
                padding: 0 5px;
                border-radius: 5px;
            } 

            input:-webkit-autofill {
                -webkit-box-shadow: 0 0 0px 1000px transparent inset;
                -webkit-text-fill-color: #fff;
                transition: background-color 5000s ease-in-out 0s;
            }

            .remember-forgot{
                display: flex;
                justify-content: space-between;
                margin: -4px 0 15px;
            }

            .remember-forgot label{
                font-size: clamp(12px, 2vw, 18px);
                color: #fff;
                
            }

            .remember-forgot label input{
                accent-color: #fff;
                margin-right: 2px;
            }

            .remember-forgot a{
                font-weight: 600;
                font-size: clamp(12px, 2vw, 18px);
                text-decoration: none;
                color: #ffffff;
                transition: all 0.4s;
                
            }
            .remember-forgot a:active{
                text-decoration: underline;
            }
            .remember-forgot a:hover{
                text-decoration: underline;
            }


            button{
                width: 100%;
                height: 45px;
                background-color: rgb(3, 75, 3);
                border: none;
                border-radius: 18px;
                cursor: pointer;
                color: #fff;
                font-weight: bold;
                margin: 10px 0;
                box-shadow: 0 0 10px rgba(0, 0, 0, .1);
                transition: all 0.5s;

                &:active{
                    transform: scale(0.8);
                    background-color: rgb(62, 165, 62);
                }
            }

            .account{
                text-align: center;
                padding: 8px;
                margin: 10px 0;

                p{
                    color: #fff;
                    font-weight: 600;
                    font-size: clamp(12px, 2vw, 18px);
                    

                    a{
                        color: rgb(0, 128, 0);
                        font-weight: 600;
                        text-decoration: none;
                        padding-left: 5px;
                        transition: all 0.4s;


                        &:active{
                            color: rgb(2, 187, 2);
                            text-decoration: underline;
                        }

                        &:hover{
                            color: rgb(2, 187, 2);
                            text-decoration: underline;
                        }
                    }
                }
            }
    </style>
</head>
<body>
    <main class="container">
        <form action="">
            <h3>Bem-vindo ao meLeva</h3>

            <div class="inputs-box-label">
                <input type="email" name="" id="box-email" required>
                <label for="">Digite seu email</label>
            </div>

            <div class="inputs-box-label">
                <input type="password" name="" id="box-password" required>
                <label for="">Password</label>
            </div>

            <div class="remember-forgot">
                <label>
                    <input type="checkbox">
                    Lembrar de mim
                </label>
                <a href="#">Esqueceu sua senha?</a>
            </div>

            <button type="submit">Entrar</button>

            <div class="account">
                <p>Ainda não tem uma conta?<a href="cadastro.html">Criar conta</a></p>
            </div>
        </form>
    </main>
</body>
</html>
