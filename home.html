<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://unpkg.com">
    <link rel="preconnect" href="https://a.basemaps.cartocdn.com">
    <link rel="preconnect" href="https://b.basemaps.cartocdn.com">
    <link rel="preconnect" href="https://c.basemaps.cartocdn.com">
    <link rel="preconnect" href="https://d.basemaps.cartocdn.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="SRC/estilos/import.css">
    <link rel="stylesheet" href="SRC/estilos/import-headers.css">
    <link rel="stylesheet" href="SRC/estilos/home-styles/style.css">
    <title>Home</title>
</head>
<body>
    <div class="overlay"></div>
    <header>
        <div id="menu">
            <button class="btn-menu">
                <i class="fa-solid fa-bars"></i>
            </button>
            <div class="menu-user-info">
                <span>Olá, Alexandre</span>
                <span class="text-span">Bem vindo ao meLeva</span>
            </div>
        </div>
        <i class="fa-regular fa-bell" id="notificacao"></i>
    </header>

    <nav id="sidebar-top">
        <div id="sidebar-content-top">
            <div id="user">
                <img src="SRC/imagem/avatar.png" alt="avatar" id="user-avatar">
                <div class="user-info">
                    <span class="item-description">Alexandre</span>
                    <span class="item-description">Para onde vamos hoje?</span>
                </div>
            </div>
            <ul id="side-top-itens">
                    <li class="side-top-item active">
                        <a href="#">
                            <i class="fa-solid fa-chart-line"></i>
                            <span class="item-description">
                                Dashboard
                            </span>
                        </a>
                    </li>
                    <li class="side-top-item">
                        <a href="#">
                            <i class="fa-solid fa-user"></i>
                            <span class="item-description">
                                Usuários
                            </span>
                        </a>
                    </li>
                    <li class="side-top-item">
                        <a href="#">
                            <i class="fa-solid fa-bell"></i>
                            <span class="item-description">
                                Notificações
                            </span>
                        </a>
                    </li>
                    <li class="side-top-item">
                        <a href="#">
                            <i class="fa-solid fa-box"></i>
                            <span class="item-description">
                                Produtos
                            </span>
                        </a>
                    </li>
                    <li class="side-top-item">
                        <a href="#">
                            <i class="fa-solid fa-image"></i>
                            <span class="item-description">
                                Imagens
                            </span>
                        </a>
                    </li>
                    <li class="side-top-item">
                        <a href="#">
                            <i class="fa-solid fa-gear"></i>
                            <span class="item-description">
                                Configurações
                            </span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>

        <div id="logout">
            <a href="#" id="logout-btn">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span class="item-logout item-description">Logout</span>
            </a>
        </div>
    </nav>

    <nav id="sidebar-bottom">
        <div id="side-bottom-contents">
            <ul id="side-bottom-itens">
                <li class="side-bottom-item ">
                    <a href="#">
                        <i class="fa-solid fa-house active"></i>
                        <span>
                            Início
                        </span>
                    </a>
                </li>
                <li class="side-bottom-item">
                    <a href="#">
                        <i class="fa-solid fa-car"></i>
                        <span>
                            Viagens
                        </span>
                    </a>
                </li>
                <li class="side-bottom-item">
                    <a href="solicitar-v.html">
                        <i class="fa-solid fa-location-arrow"></i>
                        <span>
                            Solicitar
                        </span>
                    </a>
                </li>
                <li class="side-bottom-item">
                    <a href="#">
                        <i class="fa-solid fa-credit-card"></i>
                        <span>
                            Carteira
                        </span>
                    </a>
                </li>
                <li class="side-bottom-item">
                    <a href="#">
                        <i class="fa-regular fa-circle-user"></i>
                        <span>
                            Perfil
                        </span>
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <main id="container">
    <!-- Mapa -->
        <div class="map-wrap">
            <div id="map"></div>
    
            <button class="locate-pill" id="use-current-location">
            <span class="dot-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="#5dd428" stroke-width="2"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3" stroke="#5dd428" stroke-width="2" stroke-linecap="round"/></svg>
            </span>
            <span>Usar a minha<br>localização atual</span>
            </button>
    
            <button class="locate-fab" id="recenter-btn" aria-label="Centralizar mapa">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="#5dd428" stroke-width="2"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3" stroke="#5dd428" stroke-width="2" stroke-linecap="round"/></svg>
            </button>
        </div>
    </main>
    
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="SRC/scripts/sidebar-top.js"></script>
    <script src="SRC/scripts/maps.js"></script>
    <script src="SRC/scripts/sidebar-bottom.js"></script>
</body>
</html>
